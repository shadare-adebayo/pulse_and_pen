<nav>
    {% if user.is_authenticated %}
        <h3><a href="{% url 'dashboard' %}">Dashboard</a></h3>
        <h3><a href="{% url 'bp_list' %}"> All Entries</a></h3>
        <h3><a href="{% url 'bp_create' %}"> Add Entry</a></h3>
          
        
        

        <form method="post" action="{% url 'logout' %}" style="display: inline;">
            {% csrf_token %}
            <button type="submit" style="background: none;border: none;padding: 0;color: blue;cursor: pointer;">
                Logout
            </button>
        </form>
    {% else %}
        <h3><a href="{% url 'login' %}"> Login </a></h3>
        <h3><a href="{% url 'registration' %}">Register</a></h3>
    {% endif %}
</nav>
<hr>
